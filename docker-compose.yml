services:

  backend:
    build: .
    container_name: toolkit-backend
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - toolkit-data:/data
    networks:
      - toolkit-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: toolkit-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - toolkit-network

  proxy:
    image: nginx:alpine
    container_name: toolkit-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - toolkit-network
    depends_on:
      - backend

volumes:
  toolkit-data:
  redis-data:

networks:
  toolkit-network:
    driver: bridge